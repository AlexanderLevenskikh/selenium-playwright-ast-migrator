stages:
  - test
  - pack
  - publish

variables:
  PACKAGE_ID: "SeleniumPlaywrightMigrator"
  PACKAGE_VERSION: "0.6.0-preview.${CI_PIPELINE_IID}"

test:migrator:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:8.0
  script:
    - dotnet restore Migrator.sln
    - dotnet test Migrator.sln --no-restore

pack:migrator-tool:
  stage: pack
  image: mcr.microsoft.com/dotnet/sdk:8.0
  script:
    - dotnet restore Migrator.sln
    - dotnet pack Migrator.Cli/Migrator.Cli.csproj -c Release -o artifacts/nuget /p:PackageId=$PACKAGE_ID /p:Version=$PACKAGE_VERSION
  artifacts:
    paths:
      - artifacts/nuget/*.nupkg

publish:migrator-tool:
  stage: publish
  image: mcr.microsoft.com/dotnet/sdk:8.0
  needs:
    - job: pack:migrator-tool
      artifacts: true
  rules:
    - if: '$CI_COMMIT_TAG'
    - when: manual
  script:
    - dotnet nuget push "artifacts/nuget/${PACKAGE_ID}.${PACKAGE_VERSION}.nupkg" --source "$NUGET_SOURCE" --api-key "$NUGET_API_KEY" --skip-duplicate
