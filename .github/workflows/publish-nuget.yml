name: Publish NuGet Tool

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version to publish, for example 0.0.0-preview.1'
        required: true
        type: string
      source:
        description: 'NuGet package source URL'
        required: true
        default: 'https://api.nuget.org/v3/index.json'
        type: string
      dry_run:
        description: 'Build, pack, verify, and smoke only. Do not publish.'
        required: true
        default: true
        type: boolean
      create_github_release:
        description: 'After a successful publish, create or update the GitHub release and attach the nupkg plus standalone assets.'
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  pack-smoke:
    name: Pack and smoke release candidate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Migrator.sln

      - name: Build
        run: dotnet build Migrator.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test Migrator.sln --no-build --configuration Release --verbosity normal

      - name: Pack dotnet tool
        run: bash scripts/pack-tool.sh "${{ inputs.version }}"

      - name: Verify nupkg contents
        run: bash scripts/verify-nupkg-contents.sh "artifacts/nuget/SeleniumPlaywrightMigrator.${{ inputs.version }}.nupkg"

      - name: Smoke local tool install
        run: bash scripts/smoke-local-tool-package.sh "${{ inputs.version }}"

      - name: Package standalone release archives
        shell: pwsh
        run: ./scripts/package-standalone.ps1 -Version "${{ inputs.version }}"

      - name: Verify release artifact set
        shell: pwsh
        run: ./scripts/verify-release-artifacts.ps1 -Version "${{ inputs.version }}"

      - name: Upload verified package artifact
        uses: actions/upload-artifact@v4
        with:
          name: selenium-playwright-ast-migrator-${{ inputs.version }}
          path: artifacts/nuget/*.nupkg
          if-no-files-found: error

      - name: Stage GitHub release assets
        shell: bash
        run: |
          set -euo pipefail

          asset_dir="artifacts/github-release"
          rm -rf "$asset_dir"
          mkdir -p "$asset_dir"

          cp "artifacts/nuget/SeleniumPlaywrightMigrator.${{ inputs.version }}.nupkg" "$asset_dir/"
          cp artifacts/release/*.zip "$asset_dir/"
          cp artifacts/release/*.tar.gz "$asset_dir/"
          cp artifacts/release/checksums.sha256 "$asset_dir/"
          cp artifacts/release/standalone-release-manifest.json "$asset_dir/"
          cp scripts/install-standalone.ps1 "$asset_dir/"
          cp scripts/install-standalone.sh "$asset_dir/"

          echo "Staged GitHub release assets:"
          find "$asset_dir" -maxdepth 1 -type f -printf '  %f\n' | sort

      - name: Verify staged GitHub release assets
        shell: pwsh
        run: ./scripts/verify-release-artifacts.ps1 -Version "${{ inputs.version }}" -ReleaseDir artifacts/github-release -ScriptsDir artifacts/github-release

      - name: Upload GitHub release assets
        uses: actions/upload-artifact@v4
        with:
          name: selenium-playwright-ast-migrator-release-assets-${{ inputs.version }}
          path: artifacts/github-release/*
          if-no-files-found: error

  publish:
    name: Publish verified package
    runs-on: ubuntu-latest
    needs: pack-smoke
    if: ${{ inputs.dry_run == false }}
    environment: nuget-production
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download verified package artifact
        uses: actions/download-artifact@v4
        with:
          name: selenium-playwright-ast-migrator-${{ inputs.version }}
          path: artifacts/nuget

      - name: Download GitHub release assets
        uses: actions/download-artifact@v4
        with:
          name: selenium-playwright-ast-migrator-release-assets-${{ inputs.version }}
          path: artifacts/github-release

      - name: List downloaded GitHub release assets
        shell: bash
        run: |
          set -euo pipefail
          find artifacts/github-release -maxdepth 2 -type f -printf '  %p\n' | sort

      - name: Verify downloaded GitHub release assets
        shell: pwsh
        run: ./scripts/verify-release-artifacts.ps1 -Version "${{ inputs.version }}" -ReleaseDir artifacts/github-release -ScriptsDir artifacts/github-release

      - name: NuGet trusted publishing login
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet source
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: bash scripts/push-tool.sh "${{ inputs.source }}" "${{ inputs.version }}"

      - name: Prepare GitHub release notes
        if: ${{ inputs.create_github_release == true }}
        run: bash scripts/extract-release-notes.sh "${{ inputs.version }}" .release-notes.md

      - name: Create or update GitHub release
        if: ${{ inputs.create_github_release == true }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          tag="v${VERSION}"
          title="Selenium Playwright Migrator ${VERSION}"
          asset_dir="artifacts/github-release"
          required_assets=(
            "$asset_dir/SeleniumPlaywrightMigrator.${VERSION}.nupkg"
            "$asset_dir/install-standalone.ps1"
            "$asset_dir/install-standalone.sh"
            "$asset_dir/checksums.sha256"
            "$asset_dir/standalone-release-manifest.json"
            "$asset_dir/selenium-pw-migrator-${VERSION}-win-x64.zip"
            "$asset_dir/selenium-pw-migrator-${VERSION}-linux-x64.tar.gz"
            "$asset_dir/selenium-pw-migrator-${VERSION}-osx-x64.tar.gz"
            "$asset_dir/selenium-pw-migrator-${VERSION}-osx-arm64.tar.gz"
            "$asset_dir/selenium-pw-migrator-win-x64.zip"
            "$asset_dir/selenium-pw-migrator-linux-x64.tar.gz"
            "$asset_dir/selenium-pw-migrator-osx-x64.tar.gz"
            "$asset_dir/selenium-pw-migrator-osx-arm64.tar.gz"
          )

          for asset in "${required_assets[@]}"; do
            if [[ ! -f "$asset" ]]; then
              echo "Required GitHub release asset was not found: $asset" >&2
              exit 1
            fi
          done

          release_assets=()
          while IFS= read -r -d '' asset; do
            release_assets+=("$asset")
          done < <(find "$asset_dir" -maxdepth 1 -type f -print0 | sort -z)

          echo "Uploading GitHub release assets:"
          printf '  %s\n' "${release_assets[@]}"

          prerelease_flag=()

          if [[ "$VERSION" == *-* ]]; then
            prerelease_flag=(--prerelease)
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --title "$title" \
              --notes-file .release-notes.md \
              "${prerelease_flag[@]}"
            gh release upload "$tag" "${release_assets[@]}" --clobber
          else
            gh release create "$tag" "${release_assets[@]}" \
              --title "$title" \
              --notes-file .release-notes.md \
              "${prerelease_flag[@]}"
          fi
