name: Publish NuGet Tool

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version to publish, for example 0.0.0-preview.1'
        required: true
        type: string
      source:
        description: 'NuGet package source URL'
        required: true
        default: 'https://api.nuget.org/v3/index.json'
        type: string
      dry_run:
        description: 'Build, pack, verify, and smoke only. Do not publish.'
        required: true
        default: true
        type: boolean
      create_github_release:
        description: 'After a successful publish, create or update the GitHub release and attach the nupkg.'
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  pack-smoke:
    name: Pack and smoke release candidate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Migrator.sln

      - name: Build
        run: dotnet build Migrator.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test Migrator.sln --no-build --configuration Release --verbosity normal

      - name: Pack dotnet tool
        run: bash scripts/pack-tool.sh "${{ inputs.version }}"

      - name: Verify nupkg contents
        run: bash scripts/verify-nupkg-contents.sh "artifacts/nuget/SeleniumPlaywrightMigrator.${{ inputs.version }}.nupkg"

      - name: Smoke local tool install
        run: bash scripts/smoke-local-tool-package.sh "${{ inputs.version }}"

      - name: Package standalone release archives
        shell: pwsh
        run: ./scripts/package-standalone.ps1 -Version "${{ inputs.version }}"

      - name: Upload verified package artifact
        uses: actions/upload-artifact@v4
        with:
          name: selenium-playwright-ast-migrator-${{ inputs.version }}
          path: artifacts/nuget/*.nupkg
          if-no-files-found: error

      - name: Upload standalone release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: selenium-playwright-ast-migrator-standalone-${{ inputs.version }}
          path: |
            artifacts/release/*.zip
            artifacts/release/*.tar.gz
            artifacts/release/checksums.sha256
            artifacts/release/standalone-release-manifest.json
          if-no-files-found: error

  publish:
    name: Publish verified package
    runs-on: ubuntu-latest
    needs: pack-smoke
    if: ${{ inputs.dry_run == false }}
    environment: nuget-production
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download verified package artifact
        uses: actions/download-artifact@v4
        with:
          name: selenium-playwright-ast-migrator-${{ inputs.version }}
          path: artifacts/nuget

      - name: Download standalone release artifacts
        uses: actions/download-artifact@v4
        with:
          name: selenium-playwright-ast-migrator-standalone-${{ inputs.version }}
          path: artifacts/release

      - name: NuGet trusted publishing login
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet source
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: bash scripts/push-tool.sh "${{ inputs.source }}" "${{ inputs.version }}"

      - name: Prepare GitHub release notes
        if: ${{ inputs.create_github_release == true }}
        run: bash scripts/extract-release-notes.sh "${{ inputs.version }}" .release-notes.md

      - name: Create or update GitHub release
        if: ${{ inputs.create_github_release == true }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          tag="v${VERSION}"
          title="Selenium Playwright Migrator ${VERSION}"
          package="artifacts/nuget/SeleniumPlaywrightMigrator.${VERSION}.nupkg"
          release_assets=("$package")
          while IFS= read -r -d '' asset; do
            release_assets+=("$asset")
          done < <(find artifacts/release -maxdepth 1 -type f \( -name '*.zip' -o -name '*.tar.gz' -o -name 'checksums.sha256' -o -name 'standalone-release-manifest.json' \) -print0 | sort -z)
          prerelease_flag=()

          if [[ "$VERSION" == *-* ]]; then
            prerelease_flag=(--prerelease)
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --title "$title" \
              --notes-file .release-notes.md \
              "${prerelease_flag[@]}"
            gh release upload "$tag" "${release_assets[@]}" --clobber
          else
            gh release create "$tag" "${release_assets[@]}" \
              --title "$title" \
              --notes-file .release-notes.md \
              "${prerelease_flag[@]}"
          fi
