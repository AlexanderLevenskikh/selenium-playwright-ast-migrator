name: Full Validation

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

env:
  PACKAGE_VERSION: 0.0.0-preview.${{ github.run_number }}

permissions:
  contents: read

jobs:
  full-validation:
    name: Full test, release doctor, package, and bundle smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Migrator.sln

      - name: Build
        run: dotnet build Migrator.sln --no-restore --configuration Release

      - name: Test full suite
        run: dotnet test Migrator.sln --no-build --configuration Release --verbosity normal

      - name: Enforce orchestration and validation-host performance budgets
        shell: pwsh
        run: ./scripts/run-performance-tests.ps1 -Root . -Configuration Release -Output artifacts/performance -Enforce -NoBuild

      - name: Release doctor
        run: dotnet Migrator.Cli/bin/Release/net10.0/Migrator.Cli.dll --mode release-doctor --input . --out artifacts/release-doctor --format both

      - name: Pack dotnet tool
        run: scripts/pack-tool.sh "$PACKAGE_VERSION"

      - name: Verify nupkg contents
        run: scripts/verify-nupkg-contents.sh "artifacts/nuget/SeleniumPlaywrightMigrator.$PACKAGE_VERSION.nupkg"

      - name: Smoke local tool install
        run: scripts/smoke-local-tool-package.sh "$PACKAGE_VERSION"

      - name: Package standalone bundle
        shell: pwsh
        run: ./scripts/package-standalone.ps1 -Version "$env:PACKAGE_VERSION" -Runtimes linux-x64 -NoSelfContained

      - name: Verify standalone archive
        shell: pwsh
        run: ./scripts/verify-standalone-package.ps1 -ArchivePath "artifacts/release/selenium-pw-migrator-$env:PACKAGE_VERSION-linux-x64.tar.gz" -ChecksumsPath artifacts/release/checksums.sha256 -RunHelp

      - name: Package agent CLI bundle
        shell: pwsh
        run: ./scripts/package-agent-cli-bundle.ps1 -Runtime linux-x64 -Output artifacts/agent-cli-bundle -NoSelfContained

      - name: Verify agent CLI bundle
        shell: pwsh
        run: ./scripts/verify-agent-cli-bundle.ps1 -BundleDirectory artifacts/agent-cli-bundle/tool -RunHelp

      - name: Create agent bundle archive
        run: tar -czf artifacts/agent-cli-bundle-linux-x64.tar.gz -C artifacts/agent-cli-bundle tool

      - name: Upload validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: full-validation-artifacts-${{ env.PACKAGE_VERSION }}
          path: |
            artifacts/release-doctor/**
            artifacts/performance/**
            artifacts/nuget/*.nupkg
            artifacts/release/*.tar.gz
            artifacts/release/checksums.sha256
            artifacts/release/standalone-release-manifest.json
            artifacts/agent-cli-bundle-linux-x64.tar.gz
            artifacts/agent-cli-bundle/tool/MANIFEST.sha256
            artifacts/agent-cli-bundle/tool/manifest.json
          if-no-files-found: error
